<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Olho Humanoide - Projeto Mais Ciência</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; padding: 20px; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; font-weight: bold; }
        button:hover { background: #0056b3; }
        button.connect-bt { background: #05ca05; }
        
        #simulator-container { position: relative; border: 4px solid #333; border-radius: 10px; overflow: hidden; background: black; }
        canvas { position: absolute; top: 0; left: 0; }
        
        .status-box { margin-top: 15px; display: flex; gap: 20px; }
        .indicator { padding: 10px; border-radius: 8px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; }
        #blink-status { color: #d9534f; } /* Vermelho para destaque */
    </style>
</head>
<body>

    <h1>Rastreio Ocular - Interface Micro:bit</h1>

    <div class="controls">
        <button id="btn-serial">Conectar via USB (Serial)</button>
        <button id="btn-bluetooth" class="connect-bt">Conectar via Bluetooth</button>
    </div>

    <div id="simulator-container">
        <video id="webcam" style="width: 640px; height: 480px; transform: scaleX(-1);" autoplay playsinline></video>
        <canvas id="output_canvas" width="640" height="480" style="transform: scaleX(-1);"></canvas>
    </div>

    <div class="status-box">
        <div class="indicator" id="status-text">Status: Desconectado</div>
        <div class="indicator" id="blink-status">Olhos: Abertos</div>
        <div class="indicator" id="data-display">X: 0.00, Y: 0.00</div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const statusText = document.getElementById("status-text");
        const blinkStatus = document.getElementById("blink-status");
        const dataDisplay = document.getElementById("data-display");

        let faceLandmarker;
        let port; 
        let writer; 
        let btCharacteristic; 

        async function setupIA() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { 
                    modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, 
                    delegate: "GPU" 
                },
                outputFaceBlendshapes: true, // Reativado para detectar o piscar
                runningMode: "VIDEO",
                numFaces: 1,
                minFaceDetectionConfidence: 0.5,
                minFacePresenceConfidence: 0.5
            });
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            });
        }

        async function predictWebcam() {
            if (faceLandmarker) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    
                    // --- RASTREIO DA ÍRIS ---
                    const irisLeft = landmarks[468];
                    const irisRight = landmarks[473];

                    // Cálculo da média do olhar
                    const avgX = ((irisLeft.x + irisRight.x) / 2).toFixed(2);
                    const avgY = ((irisLeft.y + irisRight.y) / 2).toFixed(2);

                    // --- DETECÇÃO DE PISCAR (BLENDSHAPES) ---
                    let piscar = false;
                    if (results.faceBlendshapes && results.faceBlendshapes.length > 0) {
                        const shapes = results.faceBlendshapes[0].categories;
                        // Pegamos a média de fechamento dos dois olhos (valor de 0 a 1)
                        const scoreEsquerdo = shapes.find(s => s.categoryName === "eyeBlinkLeft").score;
                        const scoreDireito = shapes.find(s => s.categoryName === "eyeBlinkRight").score;
                        
                        if (scoreEsquerdo > 0.4 || scoreDireito > 0.4) {
                            piscar = true;
                            blinkStatus.innerText = "Olhos: PISCANDO";
                            blinkStatus.style.backgroundColor = "#ffcccc";
                        } else {
                            blinkStatus.innerText = "Olhos: Abertos";
                            blinkStatus.style.backgroundColor = "white";
                        }
                    }

                    // --- ATUALIZAÇÃO DO SIMULADOR (Destaque para visualização) ---
                    // Desenha ponto no olho esquerdo
                    canvasCtx.fillStyle = "#00FF00"; // Verde para visibilidade
                    canvasCtx.beginPath();
                    canvasCtx.arc(irisLeft.x * canvasElement.width, irisLeft.y * canvasElement.height, 6, 0, 2 * Math.PI);
                    canvasCtx.fill();

                    // Desenha ponto no olho direito
                    canvasCtx.beginPath();
                    canvasCtx.arc(irisRight.x * canvasElement.width, irisRight.y * canvasElement.height, 6, 0, 2 * Math.PI);
                    canvasCtx.fill();

                    // --- ENVIO DE DADOS ---
                    dataDisplay.innerText = `X: ${avgX}, Y: ${avgY}`;
                    // Enviamos X, Y e um valor 1 ou 0 para piscar
                    enviarDados(avgX, avgY, piscar ? 1 : 0);
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        // --- CONEXÕES ---
        document.getElementById("btn-serial").addEventListener("click", async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                writer = port.writable.getWriter();
                statusText.innerText = "Status: USB OK";
            } catch (err) { console.error(err); }
        });

        document.getElementById("btn-bluetooth").addEventListener("click", async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e']
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                btCharacteristic = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
                statusText.innerText = "Status: Bluetooth OK";
            } catch (err) { console.error(err); }
        });

        async function enviarDados(x, y, p) {
            const msg = `${x},${y},${p}\n`; // Agora envia X, Y e P (Piscar)
            const encoder = new TextEncoder();
            const data = encoder.encode(msg);
            if (writer) await writer.write(data);
            if (btCharacteristic) await btCharacteristic.writeValue(data);
        }

        setupIA();
    </script>
</body>
</html>

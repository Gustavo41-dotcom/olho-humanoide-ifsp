<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Olho Humanoide - Projeto Mais Ciência</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; padding: 20px; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; font-weight: bold; }
        button:hover { background: #0056b3; }
        button.connect-bt { background: #05ca05; }
        
        /* ESTILO DO SIMULADOR (Pode ser removido no futuro) */
        #simulator-container { position: relative; border: 4px solid #333; border-radius: 10px; overflow: hidden; background: black; }
        canvas { position: absolute; top: 0; left: 0; }
        .status { margin-top: 10px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <h1>Rastreio Ocular - Interface Micro:bit</h1>

    <div class="controls">
        <button id="btn-serial">Conectar via USB (Serial)</button>
        <button id="btn-bluetooth" class="connect-bt">Conectar via Bluetooth</button>
    </div>

    <div id="simulator-container">
        <video id="webcam" style="width: 320px; height: 240px; transform: scaleX(-1);" autoplay playsinline></video>
        <canvas id="output_canvas" width="640" height="480" style="transform: scaleX(-1);"></canvas>
    </div>
    <div class="status" id="status-text">Status: Aguardando conexão...</div>
    <div id="data-display" style="font-family: monospace; margin-top: 10px; background: #ddd; padding: 5px;">X: 0.00, Y: 0.00</div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const statusText = document.getElementById("status-text");
        const dataDisplay = document.getElementById("data-display");

        let faceLandmarker;
        let port; // Porta Serial
        let writer; // Escritor Serial
        let btCharacteristic; // Característica Bluetooth

        // --- CONFIGURAÇÃO DA IA ---
        async function setupIA() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
             faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { 
                modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, 
                delegate: "GPU" 
                                },
        outputFaceBlendshapes: false, // Desative para ganhar velocidade
        runningMode: "VIDEO",
        numFaces: 1,
        minFaceDetectionConfidence: 0.5, // Menos exigente = Mais rápido
        minFacePresenceConfidence: 0.5
    });
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: true }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            });
        }

        async function predictWebcam() {
            if (faceLandmarker) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    
                    // Ponto 468 = Íris Esquerda | Ponto 473 = Íris Direita
                    const irisLeft = landmarks[468];
                    const irisRight = landmarks[473];

                    // Cálculo da média (Centro do Olhar)
                    const avgX = ((irisLeft.x + irisRight.x) / 2).toFixed(2);
                    const avgY = ((irisLeft.y + irisRight.y) / 2).toFixed(2);

                    dataDisplay.innerText = `X: ${avgX}, Y: ${avgY}`;
                    enviarDados(avgX, avgY);
                    
                    // Exibir no simulador (Pode ser removido no futuro)
                    canvasCtx.fillStyle = "#FF0000";
                    canvasCtx.beginPath();
                    canvasCtx.arc(irisLeft.x * canvasElement.width, irisLeft.y * canvasElement.height, 5, 0, 2 * Math.PI);
                    canvasCtx.fill();

                    // Formatar dados (Normalizados entre 0 e 1)
                    const x = irisLeft.x.toFixed(2);
                    const y = irisLeft.y.toFixed(2);
                    dataDisplay.innerText = `X: ${x}, Y: ${y}`;

                    enviarDados(x, y);
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        // --- CONEXÃO SERIAL (USB) ---
        document.getElementById("btn-serial").addEventListener("click", async () => {
            try {
                port = await navigator.serial.requestPort();
                await port.open({ baudRate: 115200 });
                writer = port.writable.getWriter();
                statusText.innerText = "Status: Conectado via USB!";
            } catch (err) {
                console.error("Erro Serial:", err);
            }
        });

        // --- CONEXÃO BLUETOOTH ---
        document.getElementById("btn-bluetooth").addEventListener("click", async () => {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    filters: [{ namePrefix: 'BBC micro:bit' }],
                    optionalServices: ['6e400001-b5a3-f393-e0a9-e50e24dcca9e'] // Serviço UART do micro:bit
                });
                const server = await device.gatt.connect();
                const service = await server.getPrimaryService('6e400001-b5a3-f393-e0a9-e50e24dcca9e');
                btCharacteristic = await service.getCharacteristic('6e400002-b5a3-f393-e0a9-e50e24dcca9e');
                statusText.innerText = "Status: Conectado via Bluetooth!";
            } catch (err) {
                console.error("Erro Bluetooth:", err);
            }
        });

        // --- ENVIO DOS DADOS ---
        async function enviarDados(x, y) {
            const msg = `${x},${y}\n`;
            const encoder = new TextEncoder();
            const data = encoder.encode(msg);

            // Enviar via USB
            if (writer) {
                await writer.write(data);
            }
            
            // Enviar via Bluetooth
            if (btCharacteristic) {
                await btCharacteristic.writeValue(data);
            }
        }

        setupIA();
    </script>
</body>
</html>

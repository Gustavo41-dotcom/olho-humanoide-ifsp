<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gêmeo Digital: Olho Humanoide - Projeto Mais Ciência</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision/vision_bundle.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; padding: 20px; color: #333; }
        .controls { margin-bottom: 20px; display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 5px; border: none; background: #007bff; color: white; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; transform: scale(1.05); }
        button.connect-bt { background: #05ca05; }
        
        .main-container { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
        
        #webcam-container { position: relative; border: 4px solid #333; border-radius: 10px; overflow: hidden; background: black; width: 320px; height: 240px; }
        video { width: 320px; height: 240px; transform: scaleX(-1); }
        canvas#output_canvas { position: absolute; top: 0; left: 0; width: 320px; height: 240px; transform: scaleX(-1); }

        /* ESTILO DO SIMULADOR 3D */
        #three-container { width: 400px; height: 240px; border: 4px solid #007bff; border-radius: 10px; background: #111; }

        .status-box { margin-top: 15px; display: flex; gap: 15px; flex-wrap: wrap; }
        .indicator { padding: 10px; border-radius: 8px; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-weight: bold; font-size: 0.9em; }
        #blink-status { color: #d9534f; }
    </style>
</head>
<body>

    <h1>Gêmeo Digital: Rastreio Ocular</h1>

    <div class="controls">
        <button id="btn-serial">USB (Serial)</button>
        <button id="btn-bluetooth" class="connect-bt">Bluetooth</button>
    </div>

    <div class="main-container">
        <div id="webcam-container">
            <video id="webcam" autoplay playsinline></video>
            <canvas id="output_canvas"></canvas>
        </div>

        <div id="three-container"></div>
    </div>

    <div class="status-box">
        <div class="indicator" id="status-text">Status: Desconectado</div>
        <div class="indicator" id="blink-status">Olhos: Abertos</div>
        <div class="indicator" id="data-display">X: 0.50, Y: 0.50</div>
    </div>

    <script type="module">
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById("webcam");
        const canvasElement = document.getElementById("output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const statusText = document.getElementById("status-text");
        const blinkStatus = document.getElementById("blink-status");
        const dataDisplay = document.getElementById("data-display");

        let faceLandmarker;
        let port, writer, btCharacteristic;
        let lastSendTime = 0;
        let smoothX = 0.5, smoothY = 0.5;

        // --- CONFIGURAÇÃO DO THREE.JS (MODELO 3D) ---
        const container3d = document.getElementById('three-container');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, 400 / 240, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(400, 240);
        container3d.appendChild(renderer.domElement);

        // Criando os Olhos (Esferas)
        const eyeGeometry = new THREE.SphereGeometry(1, 32, 32);
        const eyeMaterial = new THREE.MeshPhongMaterial({ color: 0xffffff });
        
        const leftEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        const rightEye = new THREE.Mesh(eyeGeometry, eyeMaterial);
        
        leftEye.position.x = -1.5;
        rightEye.position.x = 1.5;
        
        // Adicionando Pupilas (Simples)
        const pupilGeometry = new THREE.SphereGeometry(0.3, 16, 16);
        const pupilMaterial = new THREE.MeshBasicMaterial({ color: 0x000000 });
        const leftPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
        const rightPupil = new THREE.Mesh(pupilGeometry, pupilMaterial);
        
        leftPupil.position.z = 0.9; // Coloca na frente do olho
        rightPupil.position.z = 0.9;
        
        leftEye.add(leftPupil);
        rightEye.add(rightPupil);
        
        scene.add(leftEye, rightEye);

        // Luzes
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(0, 0, 5);
        scene.add(light, new THREE.AmbientLight(0x404040));
        
        camera.position.z = 5;

        function animate3D() {
            requestAnimationFrame(animate3D);
            renderer.render(scene, camera);
        }
        animate3D();

        // --- CONFIGURAÇÃO DA IA ---
        async function setupIA() {
            const filesetResolver = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
            faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task`, delegate: "GPU" },
                outputFaceBlendshapes: true,
                runningMode: "VIDEO",
                numFaces: 1
            });
            startCamera();
        }

        function startCamera() {
            navigator.mediaDevices.getUserMedia({ video: { width: 320, height: 240 } }).then((stream) => {
                video.srcObject = stream;
                video.addEventListener("loadeddata", predictWebcam);
            });
        }

        async function predictWebcam() {
            if (faceLandmarker) {
                const results = faceLandmarker.detectForVideo(video, performance.now());
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

                if (results.faceLandmarks && results.faceLandmarks.length > 0) {
                    const landmarks = results.faceLandmarks[0];
                    const rawX = (landmarks[468].x + landmarks[473].x) / 2;
                    const rawY = (landmarks[468].y + landmarks[473].y) / 2;
                    
                    smoothX = (smoothX * 0.7) + (rawX * 0.3);
                    smoothY = (smoothY * 0.7) + (rawY * 0.3);

                    // ATUALIZA O MODELO 3D
                    // Mapeia 0.4-0.6 para rotação de aprox. 30 graus (0.5 radianos)
                    const rotY = (smoothX - 0.5) * 2; 
                    const rotX = (smoothY - 0.5) * 2;

                    leftEye.rotation.y = -rotY; // Invertido para espelhar
                    leftEye.rotation.x = rotX;
                    rightEye.rotation.y = -rotY;
                    rightEye.rotation.x = rotX;

                    // DETECÇÃO DE PISCAR
                    let piscar = false;
                    if (results.faceBlendshapes && results.faceBlendshapes.length > 0) {
                        const shapes = results.faceBlendshapes[0].categories;
                        const score = (shapes.find(s => s.categoryName === "eyeBlinkLeft").score + shapes.find(s => s.categoryName === "eyeBlinkRight").score) / 2;
                        if (score > 0.4) {
                            piscar = true;
                            blinkStatus.innerText = "Olhos: PISCANDO";
                            leftEye.scale.y = 0.1; // "Fecha" o olho 3D
                            rightEye.scale.y = 0.1;
                        } else {
                            blinkStatus.innerText = "Olhos: Abertos";
                            leftEye.scale.y = 1.0;
                            rightEye.scale.y = 1.0;
                        }
                    }

                    // ENVIO SERIAL CONTROLADO
                    dataDisplay.innerText = `X: ${smoothX.toFixed(2)}, Y: ${smoothY.toFixed(2)}`;
                    const agora = Date.now();
                    if (agora - lastSendTime > 60) {
                        enviarDados(smoothX.toFixed(2), smoothY.toFixed(2), piscar ? 1 : 0);
                        lastSendTime = agora;
                    }
                }
            }
            window.requestAnimationFrame(predictWebcam);
        }

        // --- FUNÇÕES DE ENVIO ---
        async function enviarDados(x, y, p) {
            const msg = `${x},${y},${p}\n`;
            if (writer) await writer.write(new TextEncoder().encode(msg));
            if (btCharacteristic) await btCharacteristic.writeValue(new TextEncoder().encode(msg));
        }

        document.getElementById("btn-serial").addEventListener("click", async () => {
            port = await navigator.serial.requestPort();
            await port.open({ baudRate: 115200 });
            writer = port.writable.getWriter();
            statusText.innerText = "Status: USB OK";
        });

        setupIA();
    </script>
</body>
</html>
